<style>
  :root{
    --bg:#0f1217; --bg2:#151a22; --card:#1c222c; --ink:#eef1f6; --muted:#9aa3b2;
    --line:#2a313d; --accent:#3f8ee0; --accent2:#8ec3f7; --gr:#e0b458; --ok:#4fc98a; --ph:#18222f;
    --shadow:0 10px 34px rgba(0,0,0,.45);
  }
  @media (prefers-color-scheme: light){
    :root{--bg:#eef1f5;--bg2:#f7f8fb;--card:#ffffff;--ink:#20242b;--muted:#6b7280;--line:#e3e6ec;
      --accent:#1466b3;--accent2:#0f4f8a;--gr:#b8862b;--ok:#2e7d5b;--ph:#eef4fb;--shadow:0 10px 30px rgba(30,40,60,.10);}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .appbar{display:flex;align-items:center;gap:10px;padding:14px 16px 4px}
  .appbar .tt{font-size:18px;font-weight:800}
  .appbar .tt .gk{color:var(--gr)}
  .appbar .prog{margin-left:auto;font-size:12.5px;color:var(--muted)}
  .deckbar{display:flex;align-items:center;gap:8px;margin:6px 16px 2px}
  .deckbar label{font-size:12.5px;color:var(--muted);font-weight:700;white-space:nowrap}
  .deckSel{flex:1;appearance:none;-webkit-appearance:none;font-size:15px;font-weight:700;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 40px 12px 14px;
    box-shadow:var(--shadow);cursor:pointer;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 20px) 55%,calc(100% - 14px) 55%;background-size:6px 6px,6px 6px;background-repeat:no-repeat}
  .seg{display:flex;gap:0;margin:8px 16px 2px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:3px}
  .seg button{flex:1;appearance:none;border:0;background:transparent;color:var(--muted);
    font-size:13px;font-weight:700;padding:8px 6px;border-radius:999px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  .topctrls{position:relative;z-index:2;background:var(--bg);padding:2px 16px 0}
  .botctrls{position:relative;z-index:2;background:var(--bg);padding:4px 16px calc(12px + env(safe-area-inset-bottom))}
  .row{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:8px}
  .btn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-size:15px;font-weight:700;padding:12px 18px;border-radius:16px;cursor:pointer;box-shadow:var(--shadow)}
  .btn:active{transform:translateY(1px)}
  .btn.big{flex:1}
  .btn.know{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 40%,var(--line))}
  .btn.ghost{background:var(--bg2);box-shadow:none;font-size:13px;padding:9px 14px;border-radius:999px;font-weight:600}
  .counter{font-size:12.5px;color:var(--muted);text-align:center;min-width:120px}
  .navrow{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .navrow .btn{padding:13px 22px}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 16px;min-height:0}
  .scene{width:min(90vw,430px);height:100%;max-height:460px;min-height:200px;perspective:1400px}
  .card{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,.15,.2,1);
    transform-style:preserve-3d;cursor:pointer}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;
    background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;gap:12px}
  .sound{position:absolute;top:10px;right:12px;z-index:2;appearance:none;border:1px solid var(--line);

function stressify(t){return t.replace(/\|([^|]+)\|/g,'<span class="stress">$1</span>');}
function Lg(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}}
function Sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const $=id=>document.getElementById(id);

let deckId = Lg('gr_deck', DECKS[0].id);
if(!DECKS.some(d=>d.id===deckId)) deckId=DECKS[0].id;
let mode = Lg('gr_mode','fwd');
let hideLearned = Lg('gr_hide',false);
let learned, order, pos=0, flipped=false;
function deck(){ return DECKS.find(d=>d.id===deckId); }
function loadDeck(){
  const d=deck(), N=d.cards.length;
  learned = new Set(Lg('gr_learned_'+d.id,[]));
  order = Lg('gr_order_'+d.id,null);
  if(!order || order.length!==N){ order=shuffleArr([...Array(N).keys()]); Sv('gr_order_'+d.id,order); }
  pos=0; flipped=false;
}
function visible(){ return hideLearned ? order.filter(i=>!learned.has(i)) : order; }

function render(){
  const d=deck(), N=d.cards.length, list=visible(), doneState=(hideLearned && list.length===0);
  $('done').style.display = doneState?'flex':'none';
  $('scene').style.display = doneState?'none':'block';
  $('topctrls').style.visibility = doneState?'hidden':'visible';
  $('botctrls').style.visibility = doneState?'hidden':'visible';
  $('prog').textContent = learned.size+' / '+N;
  $('deckSel').value = deckId;
  $('mFwd').classList.toggle('on',mode==='fwd');
  $('mRev').classList.toggle('on',mode==='rev');
  $('hideToggle').textContent = 'Скрывать выученные: '+(hideLearned?'вкл':'выкл');
  if(doneState) return;
  if(pos>=list.length) pos=0; if(pos<0) pos=list.length-1;
  const c=d.cards[list[pos]];
  flipped=false; $('card').classList.remove('flipped');
  $('tag').textContent = mode==='fwd' ? 'по-гречески' : 'перевод';
  $('front').innerHTML = mode==='fwd' ? c[0] : c[2];
  $('known').style.display = learned.has(list[pos]) ? 'block':'none';
  $('b_gr').textContent=c[0]; $('b_tr').innerHTML=stressify(c[1]); $('b_ru').textContent=c[2];
  $('b_exg').textContent=c[3]; $('b_exr').textContent=c[4];
  $('counter').textContent = (pos+1)+' / '+list.length+(hideLearned?' (осталось)':'');
}
function step(n){ const list=visible(); if(!list.length)return; pos=(pos+n+list.length)%list.length; render(); }
function speakGreek(text){
  try{
    if(!text || !('speechSynthesis' in window)) return;
    const u=new SpeechSynthesisUtterance(text); u.lang='el-GR'; u.rate=0.9;
    try{ const v=speechSynthesis.getVoices().find(x=>/^el/i.test(x.lang)); if(v) u.voice=v; }catch(e){}
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
function curCard(){ const list=visible(); return list.length ? deck().cards[list[pos]] : null; }
function soundTap(e){ e.stopPropagation(); e.preventDefault(); const c=curCard(); if(c) speakGreek(c[0]); }
function soundEx(e){ e.stopPropagation(); e.preventDefault(); const c=curCard(); if(c) speakGreek(c[3]); }

$('card').addEventListener('click',()=>{ flipped=!flipped; $('card').classList.toggle('flipped',flipped); });
['sfront','sback'].forEach(id=>{ const el=$(id); if(el) el.addEventListener('click',soundTap); });
$('sex').addEventListener('click',soundEx);
$('next').addEventListener('click',()=>step(1));
$('prev').addEventListener('click',()=>step(-1));
$('shuffle').addEventListener('click',()=>{ order=shuffleArr([...Array(deck().cards.length).keys()]); Sv('gr_order_'+deckId,order); pos=0; render(); });
$('know').addEventListener('click',()=>{ const list=visible(); if(!list.length)return; learned.add(list[pos]); Sv('gr_learned_'+deckId,[...learned]); step(1); render(); });
$('mFwd').addEventListener('click',()=>{ mode='fwd'; Sv('gr_mode',mode); render(); });
$('mRev').addEventListener('click',()=>{ mode='rev'; Sv('gr_mode',mode); render(); });
$('hideToggle').addEventListener('click',()=>{ hideLearned=!hideLearned; Sv('gr_hide',hideLearned); pos=0; render(); });
$('reset').addEventListener('click',()=>{ if(confirm('Сбросить прогресс этой колоды?')){ learned=new Set(); Sv('gr_learned_'+deckId,[]); render(); } });
$('resetDone').addEventListener('click',()=>{ learned=new Set(); Sv('gr_learned_'+deckId,[]); pos=0; render(); });
$('deckSel').addEventListener('change',e=>{ deckId=e.target.value; Sv('gr_deck',deckId); loadDeck(); render(); });

// swipe
let sx=0,sy=0;
const stage=document.querySelector('.stage');
stage.addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;},{passive:true});
stage.addEventListener('touchend',e=>{const t=e.changedTouches[0];const dx=t.clientX-sx,dy=t.clientY-sy;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)) step(dx<0?1:-1);},{passive:true});

loadDeck(); render();
</script>

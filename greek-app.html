<style>
  :root{
    --bg:#0f1217; --bg2:#151a22; --card:#1c222c; --ink:#eef1f6; --muted:#9aa3b2;
    --line:#2a313d; --accent:#3f8ee0; --accent2:#8ec3f7; --gr:#e0b458; --ok:#4fc98a; --ph:#18222f;
    --shadow:0 10px 34px rgba(0,0,0,.45);
  }
  @media (prefers-color-scheme: light){
    :root{--bg:#eef1f5;--bg2:#f7f8fb;--card:#ffffff;--ink:#20242b;--muted:#6b7280;--line:#e3e6ec;
      --accent:#1466b3;--accent2:#0f4f8a;--gr:#b8862b;--ok:#2e7d5b;--ph:#eef4fb;--shadow:0 10px 30px rgba(30,40,60,.10);}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .appbar{display:flex;align-items:center;gap:10px;padding:14px 16px 6px}
  .appbar .tt{font-size:18px;font-weight:800}
  .appbar .tt .gk{color:var(--gr)}
  .appbar .prog{margin-left:auto;font-size:12.5px;color:var(--muted)}
  .seg{display:flex;gap:0;margin:6px 16px 2px;background:var(--bg2);border:1px solid var(--line);
    border-radius:999px;padding:3px}
  .seg button{flex:1;appearance:none;border:0;background:transparent;color:var(--muted);
    font-size:13px;font-weight:700;padding:8px 6px;border-radius:999px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 16px;min-height:0}
  .scene{width:min(92vw,440px);height:100%;max-height:540px;min-height:200px;perspective:1400px}
  .card{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,.15,.2,1);
    transform-style:preserve-3d;cursor:pointer}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;
    background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;gap:12px}
  .front .word{font-size:clamp(30px,9vw,54px);font-weight:800;color:var(--accent2);line-height:1.15}
  .front .tag{position:absolute;top:16px;left:18px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .front .tap{position:absolute;bottom:18px;font-size:12px;color:var(--muted)}
  .front .known{position:absolute;top:14px;right:16px;font-size:18px;color:var(--ok);display:none}
  .back{transform:rotateY(180deg);gap:8px}
  .back .grb{font-size:28px;font-weight:800;color:var(--accent2)}
  .back .trb{font-size:15px;color:var(--muted)}
  .back .trb .stress{border-bottom:2px solid var(--accent);padding-bottom:1px}
  .back .rub{font-size:22px;font-weight:700;margin:2px 0 12px}
  .back .exline{border-top:1px solid var(--line);padding-top:12px}
  .back .exg{font-size:18px;font-weight:600}
  .back .exr{font-size:14px;color:var(--muted);margin-top:3px}
  .controls{padding:6px 16px calc(14px + env(safe-area-inset-bottom));position:relative;z-index:2;background:var(--bg)}
  .row{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:10px}
  .btn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-size:15px;font-weight:700;padding:13px 18px;border-radius:16px;cursor:pointer;box-shadow:var(--shadow)}
  .btn:active{transform:translateY(1px)}
  .btn.big{flex:1}
  .btn.know{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 40%,var(--line))}
  .btn.ghost{background:var(--bg2);box-shadow:none;font-size:13px;padding:9px 14px;border-radius:999px;font-weight:600}
  .counter{font-size:12.5px;color:var(--muted);text-align:center;min-width:120px}
  .navrow{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .navrow .btn{padding:13px 22px}
  .done{display:none;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:20px}
  .done h2{margin:0;font-size:24px}
  .foot{text-align:center;font-size:12px;color:var(--muted);padding:0 16px 8px}
  .foot a{color:var(--accent2);text-decoration:none}
  .nojs{margin:20px;padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--card);
    color:var(--ink);font-size:15px;line-height:1.6}
</style>
</head>
<body>
<noscript>
  <div class="nojs">
    <b>Это приложение требует JavaScript.</b><br>
    Ты открыл файл в режиме предпросмотра (Quick Look), где скрипты не работают.<br><br>
    • Для тренажёра без JS открой <b>greek-cards.html</b> — он работает в предпросмотре.<br>
    • Чтобы запустить это приложение, открой файл в браузере/приложении с поддержкой JavaScript
    или добавь его на домашний экран (см. инструкцию, что прислал Claude).
  </div>
</noscript>

<div class="appbar">
  <div class="tt">Ε<span class="gk">λ</span>ληνικά <span style="font-weight:600;color:var(--muted);font-size:13px">· карточки</span></div>
  <div class="prog" id="prog">0 / 72</div>
</div>
<div class="seg">
  <button id="mFwd" class="on">🇬🇷 греч → перевод</button>
  <button id="mRev">🇷🇺 перевод → греч</button>
</div>

<div class="stage">
  <div class="scene" id="scene">
    <div class="card" id="card">
      <div class="face front">
        <div class="tag" id="tag"></div>
        <div class="known" id="known">✓</div>
        <div class="word" id="front"></div>
        <div class="tap">нажми, чтобы перевернуть</div>
      </div>
      <div class="face back">
        <div class="grb" id="b_gr"></div>
        <div class="trb" id="b_tr"></div>
        <div class="rub" id="b_ru"></div>
        <div class="exline"><div class="exg" id="b_exg"></div><div class="exr" id="b_exr"></div></div>
      </div>
    </div>
  </div>
  <div class="done" id="done">
    <h2>🎉 Готово!</h2>
    <div style="color:var(--muted)">Ты отметил все слова как выученные.</div>
    <button class="btn" id="resetDone">Начать заново</button>
  </div>
</div>

<div class="controls" id="controls">
  <div class="navrow">
    <button class="btn" id="prev">‹ Назад</button>
    <span class="counter" id="counter"></span>
    <button class="btn" id="next">Вперёд ›</button>
  </div>
  <div class="row">
    <button class="btn big know" id="know">✓ Знаю</button>
    <button class="btn big" id="shuffle">🔀 Перемешать</button>
  </div>
  <div class="row">
    <button class="btn ghost" id="hideToggle">Скрывать выученные: выкл</button>
    <button class="btn ghost" id="reset">Сбросить прогресс</button>
  </div>
</div>
<div class="foot"><a href="greek-all.html">← все материалы</a> · прогресс сохраняется на этом устройстве</div>

<script>
const DECK = [["το σπίτι","[то сп|и|ти]","дом","Το σπίτι μου είναι μεγάλο.","Мой дом большой."],["το νερό","[то нер|о|]","вода","Θέλω ένα ποτήρι νερό.","Хочу стакан воды."],["ο καφές","[о каф|э|с]","кофе","Πίνω καφέ κάθε πρωί.","Я пью кофе каждое утро."],["το ψωμί","[то псом|и|]","хлеб","Αγόρασα ψωμί και τυρί.","Я купил хлеб и сыр."],["ο φίλος","[о ф|и|лос]","друг","Ο φίλος μου μένει στην Αθήνα.","Мой друг живёт в Афинах."],["η θάλασσα","[и θ|а|ласа]","море","Η θάλασσα είναι ζεστή.","Море тёплое."],["ο ήλιος","[о |и|лиос]","солнце","Ο ήλιος λάμπει.","Солнце светит."],["το παιδί","[то паиð|и|]","ребёнок","Το παιδί παίζει.","Ребёнок играет."],["η μέρα","[и м|э|ра]","день","Τι ωραία μέρα!","Какой прекрасный день!"],["η ώρα","[и |о|ра]","час, время","Τι ώρα είναι;","Который час?"],["το βιβλίο","[то вивл|и|о]","книга","Διαβάζω ένα βιβλίο.","Я читаю книгу."],["η γλώσσα","[и гл|о|са]","язык","Μαθαίνω τη γλώσσα.","Я учу язык."],["η δουλειά","[и ðуль|а|]","работа","Πάω στη δουλειά.","Я иду на работу."],["η οικογένεια","[и икой|э|ниа]","семья","Η οικογένειά μου είναι εδώ.","Моя семья здесь."],["το τηλέφωνο","[то тил|э|фоно]","телефон","Πού είναι το τηλέφωνό μου;","Где мой телефон?"],["η φωνή","[и фон|и|]","голос","Έχεις ωραία φωνή.","У тебя красивый голос."],["ο λογαριασμός","[о логарьясм|о|с]","счёт","Τον λογαριασμό, παρακαλώ.","Счёт, пожалуйста."],["ο κατάλογος","[о кат|а|логос]","меню; список","Μου φέρνετε τον κατάλογο;","Принесёте меню?"],["οι διακοπές","[и ðиакоп|э|с]","каникулы, отпуск","Καλές διακοπές!","Хорошего отдыха!"],["η μουσική","[и мусик|и|]","музыка","Μ' αρέσει η μουσική.","Мне нравится музыка."],["η αγάπη","[и аг|а|пи]","любовь","Η αγάπη είναι όμορφη.","Любовь прекрасна."],["το κλειδί","[то клиð|и|]","ключ","Πού είναι το κλειδί;","Где ключ?"],["μεγάλος","[мег|а|лос]","большой","Αυτό είναι πολύ μεγάλο.","Это очень большое."],["μικρός","[микр|о|с]","маленький","Έχω ένα μικρό σπίτι.","У меня маленький дом."],["ωραίος","[ор|э|ос]","красивый, классный","Τι ωραίος καιρός!","Какая прекрасная погода!"],["υπέροχος","[ип|э|рохос]","чудесный","Ήταν υπέροχη μέρα.","Это был чудесный день."],["καλά","[кал|а|]","хорошо","Είμαι καλά.","У меня всё хорошо."],["σήμερα","[с|и|мера]","сегодня","Σήμερα δεν δουλεύω.","Сегодня я не работаю."],["αύριο","[|а|врио]","завтра","Αύριο πάμε στη θάλασσα.","Завтра идём на море."],["τώρα","[т|о|ра]","сейчас","Πάμε τώρα;","Идём сейчас?"],["επίσης","[еп|и|сис]","тоже, также","«Καλή όρεξη!» «Επίσης!»","«Приятного!» «И тебе!»"],["περίπου","[пер|и|пу]","примерно","Περίπου δέκα λεπτά.","Примерно десять минут."],["είμαι","[|и|ме]","быть","Είμαι από τη Ρωσία.","Я из России."],["έχω","[|э|хо]","иметь","Έχω δύο αδέλφια.","У меня двое братьев и сестёр."],["θέλω","[θ|э|ло]","хотеть","Θέλω να μάθω ελληνικά.","Я хочу выучить греческий."],["μπορώ","[бор|о|]","мочь","Μπορείς να με βοηθήσεις;","Можешь мне помочь?"],["κάνω","[к|а|но]","делать","Τι κάνεις;","Как дела?"],["λέω","[л|э|о]","говорить, сказать","Τι λες;","Что скажешь?"],["πάω","[п|а|о]","идти, ехать","Πάω στη δουλειά.","Я иду на работу."],["έρχομαι","[|э|рхоме]","приходить","Έρχομαι αμέσως.","Я сейчас приду."],["τρώω","[тр|о|о]","есть (кушать)","Τρώμε μαζί.","Мы едим вместе."],["πίνω","[п|и|но]","пить","Τι πίνεις;","Что будешь пить?"],["βλέπω","[вл|э|по]","видеть, смотреть","Βλέπω τηλεόραση.","Я смотрю телевизор."],["μιλάω","[мил|а|о]","говорить","Μιλάω λίγα ελληνικά.","Я немного говорю по-гречески."],["ξέρω","[кс|э|ро]","знать","Δεν ξέρω.","Я не знаю."],["καταλαβαίνω","[каталав|э|но]","понимать","Τώρα καταλαβαίνω!","Теперь понимаю!"],["διαβάζω","[ðиав|а|зо]","читать","Διαβάζω ένα βιβλίο.","Я читаю книгу."],["δουλεύω","[ðул|э|во]","работать","Δουλεύω σε γραφείο.","Я работаю в офисе."],["μένω","[м|э|но]","жить, оставаться","Μένω στην Κύπρο.","Я живу на Кипре."],["αγαπώ","[агап|о|]","любить","Αγαπώ την Ελλάδα.","Я люблю Грецию."],["προτιμώ","[протим|о|]","предпочитать","Προτιμώ τσάι.","Я предпочитаю чай."],["συμφωνώ","[симфон|о|]","соглашаться","Συμφωνώ μαζί σου.","Я с тобой согласен."],["περιμένω","[перим|э|но]","ждать","Περίμενε ένα λεπτό.","Подожди минутку."],["γεια σου","[йа су]","привет","Γεια σου! Τι κάνεις;","Привет! Как дела?"],["καλημέρα","[калим|э|ра]","доброе утро","Καλημέρα!","Доброе утро!"],["καλησπέρα","[калисп|э|ра]","добрый вечер","Καλησπέρα σας!","Добрый вечер!"],["καληνύχτα","[калин|и|хта]","спокойной ночи","Καληνύχτα!","Спокойной ночи!"],["ευχαριστώ","[эфхарист|о|]","спасибо","Ευχαριστώ πολύ!","Большое спасибо!"],["παρακαλώ","[паракал|о|]","пожалуйста","Έναν καφέ, παρακαλώ.","Один кофе, пожалуйста."],["συγγνώμη","[сигн|о|ми]","извините","Συγγνώμη, τι ώρα είναι;","Извините, который час?"],["ναι","[нэ]","да","Ναι, βεβαίως!","Да, конечно!"],["όχι","[|о|хи]","нет","Όχι, ευχαριστώ.","Нет, спасибо."],["εντάξει","[энд|а|кси]","ладно, ок","Εντάξει, πάμε!","Ладно, пошли!"],["Καλή όρεξη","[кал|и| |о|рекси]","приятного аппетита","Καλή όρεξη!","Приятного аппетита!"],["Χρόνια πολλά","[хр|о|ня пол|а|]","с праздником / днём рождения","Χρόνια πολλά!","С днём рождения!"],["πού","[пу]","где","Πού μένεις;","Где ты живёшь?"],["πότε","[п|о|те]","когда","Πότε φεύγεις;","Когда ты уезжаешь?"],["γιατί","[йат|и|]","почему","Γιατί όχι;","Почему нет?"],["πώς","[пос]","как","Πώς σε λένε;","Как тебя зовут?"],["πόσο","[п|о|со]","сколько","Πόσο κάνει;","Сколько стоит?"],["τι","[ти]","что","Τι είναι αυτό;","Что это?"],["ποιος","[пьос]","кто","Ποιος είναι;","Кто это?"]];
const N = DECK.length;
function stressify(t){return t.replace(/\|([^|]+)\|/g,'<span class="stress">$1</span>');}
function L(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}}
function S(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let mode = L('gr_mode','fwd');
let hideLearned = L('gr_hide',false);
let learned = new Set(L('gr_learned',[]));
let order = L('gr_order',null); if(!order||order.length!==N){order=shuffleArr([...Array(N).keys()]);S('gr_order',order);}
let pos = 0;
let flipped = false;

const $=id=>document.getElementById(id);
function visible(){ return hideLearned ? order.filter(i=>!learned.has(i)) : order; }

function render(){
  const list = visible();
  $('done').style.display = (hideLearned && list.length===0) ? 'flex':'none';
  $('scene').style.display = (hideLearned && list.length===0) ? 'none':'block';
  $('controls').style.visibility = (hideLearned && list.length===0) ? 'hidden':'visible';
  $('prog').textContent = learned.size + ' / ' + N;
  if(list.length===0) return;
  if(pos>=list.length) pos=0; if(pos<0) pos=list.length-1;
  const idx = list[pos];
  const d = DECK[idx];
  flipped=false; $('card').classList.remove('flipped');
  $('tag').textContent = mode==='fwd' ? 'по-гречески' : 'перевод';
  $('front').innerHTML = mode==='fwd' ? d[0] : d[2];
  $('known').style.display = learned.has(idx) ? 'block':'none';
  $('b_gr').textContent = d[0];
  $('b_tr').innerHTML = stressify(d[1]);
  $('b_ru').textContent = d[2];
  $('b_exg').textContent = d[3];
  $('b_exr').textContent = d[4];
  $('counter').textContent = (pos+1)+' / '+list.length + (hideLearned?' (осталось)':'');
  $('mFwd').classList.toggle('on',mode==='fwd');
  $('mRev').classList.toggle('on',mode==='rev');
  $('hideToggle').textContent = 'Скрывать выученные: ' + (hideLearned?'вкл':'выкл');
}
function step(n){ const list=visible(); if(!list.length)return; pos=(pos+n+list.length)%list.length; render(); }
$('card').addEventListener('click',()=>{ flipped=!flipped; $('card').classList.toggle('flipped',flipped); });
$('next').addEventListener('click',()=>step(1));
$('prev').addEventListener('click',()=>step(-1));
$('shuffle').addEventListener('click',()=>{ order=shuffleArr([...Array(N).keys()]); S('gr_order',order); pos=0; render(); });
$('know').addEventListener('click',()=>{ const list=visible(); if(!list.length)return; learned.add(list[pos]); S('gr_learned',[...learned]); step(1); render(); });
$('mFwd').addEventListener('click',()=>{ mode='fwd'; S('gr_mode',mode); render(); });
$('mRev').addEventListener('click',()=>{ mode='rev'; S('gr_mode',mode); render(); });
$('hideToggle').addEventListener('click',()=>{ hideLearned=!hideLearned; S('gr_hide',hideLearned); pos=0; render(); });
$('reset').addEventListener('click',()=>{ if(confirm('Сбросить прогресс (выученные слова)?')){ learned=new Set(); S('gr_learned',[]); render(); } });
$('resetDone').addEventListener('click',()=>{ learned=new Set(); S('gr_learned',[]); pos=0; render(); });

// swipe
let sx=0,sy=0,st=0;
const st_el=$('stage')||document.querySelector('.stage');
document.querySelector('.stage').addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;st=Date.now();},{passive:true});
document.querySelector('.stage').addEventListener('touchend',e=>{const t=e.changedTouches[0];const dx=t.clientX-sx,dy=t.clientY-sy;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){ step(dx<0?1:-1); }},{passive:true});

render();
</script>
</body>
</html>
